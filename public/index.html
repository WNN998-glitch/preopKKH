<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preop Checklist Tool</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --blue:#1d5fa8; --blue-dark:#134b8a; --green:#1f9d55; --red:#d64545;
    --gray:#8a94a6; --bg:#f4f6f9; --card:#ffffff; --border:#e1e6ee; --text:#26313f;
  }
  *{box-sizing:border-box;}
  body{font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;margin:0;background:var(--bg);color:var(--text);}
  header{background:var(--blue-dark);color:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
  header h1{font-size:19px;margin:0;font-weight:600;}
  header .sub{font-size:12px;opacity:.8;margin-top:2px;}
  .tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;}
  .tab-btn{flex:1;padding:12px;border:none;background:none;font-size:14px;font-weight:600;color:var(--gray);cursor:pointer;border-bottom:3px solid transparent;}
  .tab-btn.active{color:var(--blue);border-bottom-color:var(--blue);background:#eef4fb;}
  .toolbar{display:flex;gap:8px;padding:10px 24px;background:#fff;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;}
  .toolbar button, .toolbar label.upload-btn{border:1px solid var(--border);background:#fff;padding:7px 14px;border-radius:6px;font-size:13px;cursor:pointer;color:var(--text);}
  .toolbar select{border:1px solid var(--border);background:#fff;padding:7px 10px;border-radius:6px;font-size:13px;color:var(--text);}
  .toolbar button.primary{background:var(--blue);color:#fff;border-color:var(--blue);}
  .toolbar button.danger{color:var(--red);border-color:var(--red);}
  .toolbar label.upload-btn{background:#eef4fb;color:var(--blue-dark);border-color:var(--blue);font-weight:600;}
  .toolbar .status{margin-left:auto;font-size:13px;font-weight:600;}
  .toolbar .status.error{color:var(--red);}
  main{max-width:1180px;margin:0 auto;padding:16px 24px 60px;}
  .summary{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:18px;}
  .summary-bar{height:8px;border-radius:6px;background:#e6e9ef;overflow:hidden;margin:8px 0;}
  .summary-bar-fill{height:100%;background:var(--green);transition:width .2s;}
  .summary-missing{font-size:13px;color:var(--red);line-height:1.7;}
  .summary-missing a{color:var(--red);cursor:pointer;text-decoration:underline;}
  .summary-complete{font-size:13px;color:var(--green);font-weight:600;}
  section.card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;overflow:hidden;}
  section.card h2{font-size:14px;margin:0;padding:12px 16px;background:#f7f9fc;border-bottom:1px solid var(--border);color:var(--blue-dark);}
  .field-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;padding:14px 16px;}
  .field{display:flex;flex-direction:column;gap:4px;}
  .field.full{grid-column:1/-1;}
  .field label{font-size:12.5px;font-weight:600;color:#48566b;}
  .field input[type=text],.field input[type=number],.field input[type=date],.field select,.field textarea{
    border:1px solid var(--border);border-radius:6px;padding:7px 9px;font-size:13.5px;font-family:inherit;color:var(--text);background:#fff;
  }
  .field textarea{resize:vertical;min-height:44px;}
  .field input.missing,.field select.missing{border-color:var(--red);background:#fff5f5;}
  .field input.filled,.field select.filled{border-color:var(--green);}
  .check3{display:flex;align-items:center;gap:10px;padding:8px 0;}
  .check3 .status-pill{border:none;border-radius:14px;padding:6px 12px;font-size:12.5px;font-weight:700;cursor:pointer;min-width:88px;text-align:center;}
  .pill-pending{background:#fdecec;color:var(--red);}
  .pill-done{background:#e7f7ee;color:var(--green);}
  .pill-na{background:#eef0f4;color:var(--gray);}
  .check3 label{font-size:13.5px;font-weight:500;color:var(--text);flex:1;}
  .empty-state{padding:40px 20px;text-align:center;color:var(--gray);font-size:14px;}
  .room-meta{font-size:12px;color:var(--gray);padding:0 16px 10px;}
  table.plist{width:100%;border-collapse:collapse;font-size:12.5px;}
  table.plist th, table.plist td{border:1px solid var(--border);padding:6px 7px;text-align:left;vertical-align:top;}
  table.plist th{background:#f7f9fc;font-weight:700;color:#48566b;white-space:nowrap;}
  table.plist td.chk{text-align:center;width:34px;}
  table.plist td.chk input{width:16px;height:16px;cursor:pointer;}
  table.plist tr.row-complete{background:#f3fbf6;}
  table.plist tr:target, table.plist tr.jump-highlight{outline:2px solid var(--blue);}
  table.plist tr.ward-group-row td{background:#eef4fb;font-weight:700;color:var(--blue-dark);border-top:2px solid var(--blue);padding:5px 8px;}
  .row-del-btn{border:1px solid var(--border);background:#fff;color:var(--red);border-radius:5px;width:22px;height:22px;line-height:1;cursor:pointer;font-size:13px;}
  .row-del-btn:hover{background:#fdecec;border-color:var(--red);}
  .room-del-btn{border:1px solid var(--border);background:#fff;color:var(--red);border-radius:6px;padding:4px 10px;font-size:11.5px;cursor:pointer;}
  .room-del-btn:hover{background:#fdecec;border-color:var(--red);}
  footer{text-align:center;font-size:12px;color:var(--gray);padding:20px;}
  @media print{
    header,.tabs,.toolbar,.summary{display:none !important;}
    body{background:#fff;}
    section.card{break-inside:avoid;border-color:#ccc;}
    .field input.missing,.field select.missing{background:#fff;border-color:#000;}
    .row-del-btn,.room-del-btn{display:none !important;}
    @page{ size: landscape; margin: 10mm; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Preop Checklist Tool</h1>
    <div class="sub">Elective Preop &amp; Anesthesia Preop — shared, synced across every computer</div>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="elective">Elective Preop</button>
  <button class="tab-btn" data-tab="anes">Anesthesia Preop</button>
</div>

<div class="toolbar">
  <button class="primary" onclick="window.print()">Print / Save PDF</button>
  <button id="refreshBtn" title="Pull the latest data from the server">Refresh</button>
  <span id="toolbar-elective" style="display:flex;gap:8px;align-items:center;">
    <label class="upload-btn">Upload Room File(s)<input type="file" id="fileInput" multiple accept=".xlsx,.xls" style="display:none;"></label>
    <select id="sortMode" title="How to group the patient list">
      <option value="room">Group: By Room</option>
      <option value="ward">Group: By Ward (all rooms)</option>
    </select>
    <button class="danger" id="clearListBtn">Clear List</button>
  </span>
  <span id="toolbar-anes" style="display:none;gap:8px;align-items:center;">
    <button class="danger" id="resetBtn">New Patient (Clear)</button>
  </span>
  <span class="status" id="saveStatus">Loading…</span>
</div>

<main>
  <div class="summary" id="summary"></div>
  <div id="elective-panel"></div>
  <div id="anes-panel" style="display:none;"></div>
</main>

<footer>Data is stored on the shared server, not just this browser — anyone with this link can view and check off the same list.</footer>

<script>
/* =========================================================================
   API helpers
   ========================================================================= */

let pendingSaves = 0;

function setStatus(text, isError){
  const s = document.getElementById('saveStatus');
  s.textContent = text;
  s.classList.toggle('error', !!isError);
}

async function api(method, url, body){
  pendingSaves++;
  try{
    const opts = { method, headers: {} };
    if(body !== undefined){
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(body);
    }
    const res = await fetch(url, opts);
    if(!res.ok) throw new Error('Server error ' + res.status);
    return await res.json();
  } finally {
    pendingSaves--;
  }
}

/* =========================================================================
   ELECTIVE PREOP — built from uploaded room Excel exports (one file = one OR room)
   ========================================================================= */

// Checklist items every patient must have signed off before elective surgery
const ELECTIVE_CHECK_ITEMS = [
  {id:'lab', label:'Lab'},
  {id:'cxr', label:'CXR'},
  {id:'ecg', label:'ECG'},
  {id:'consent', label:'Consent'},
  {id:'marksite', label:'Marksite'},
  {id:'case_form', label:'ใบรับเคส'},
];

// Fixed column layout of the hospital's room export files:
// 0 time | 1 HN | 2 name | 3 age | 4 ward | 5 diagnosis | 6 procedure |
// 7 equipment | 8 NPO | 9 surgeon | 10 anesthesia | 11 recorder | 12 reason-not-operated
const COL = {TIME:0, HN:1, NAME:2, AGE:3, WARD:4, DX:5, PROC:6, EQUIP:7, NPO:8, SURGEON:9, ANES:10, RECORDER:11, REASON:12};

function parseRoomFile(arrayBuffer, filename){
  const wb = XLSX.read(arrayBuffer, {type:'array'});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:false, defval:null});
  if(rows.length < 3) return null;

  const dateLabel = (rows[0] && rows[0][0]) ? String(rows[0][0]).trim() : filename;
  const roomLabel = (rows[1] && rows[1][0]) ? String(rows[1][0]).trim() : 'Unknown Room';

  const patients = [];
  const hnSeenCount = {}; // tracks repeat HNs within this same file so keys stay stable across re-uploads
  for(let i=2;i<rows.length;i++){
    const r = rows[i];
    if(!r || !r[COL.HN]) continue; // skip blank / header repeats
    const reason = r[COL.REASON] ? String(r[COL.REASON]).trim() : '';
    if(reason) continue; // auto-exclude duplicates ("ลงซ้ำ") and cancelled cases (reason filled)
    const hn = String(r[COL.HN]).trim();
    hnSeenCount[hn] = (hnSeenCount[hn] || 0) + 1;
    // Key is based on date + HN (+ occurrence # if the same HN appears more than once
    // within this file). It deliberately does NOT include room or time, so if a patient's
    // OR room or operation time changes and you re-upload the affected room file(s), the
    // patient's checklist ticks stay put — the row just moves to its new room with fresh info.
    const key = [dateLabel, hn, hnSeenCount[hn]].join('|');
    patients.push({
      key,
      time: r[COL.TIME] ? String(r[COL.TIME]).trim() : '',
      hn,
      name: r[COL.NAME] ? String(r[COL.NAME]).trim() : '',
      age: r[COL.AGE] ? String(r[COL.AGE]).trim() : '',
      ward: r[COL.WARD] ? String(r[COL.WARD]).trim() : '',
      diagnosis: r[COL.DX] ? String(r[COL.DX]).trim() : '',
      procedure: r[COL.PROC] ? String(r[COL.PROC]).trim() : '',
      npo: r[COL.NPO] ? String(r[COL.NPO]).trim() : '',
      surgeon: r[COL.SURGEON] ? String(r[COL.SURGEON]).trim() : '',
      anesthesia: r[COL.ANES] ? String(r[COL.ANES]).trim() : '',
    });
  }
  return { date: dateLabel, room: roomLabel, patients };
}

function patientKey(p){ return p.key; }

let elective = { rooms: {}, checks: {} }; // local cache of server state

async function refreshElective(){
  try{
    elective = await api('GET', '/api/elective');
    renderElective();
    if(document.querySelector('.tab-btn.active').dataset.tab === 'elective') renderSummary();
    setStatus('Synced ' + new Date().toLocaleTimeString());
  }catch(err){
    setStatus('Sync error — will retry', true);
  }
}

function handleFiles(fileList){
  const files = Array.from(fileList);
  let pending = files.length;
  if(!pending) return;
  files.forEach(file=>{
    const reader = new FileReader();
    reader.onload = async (e)=>{
      try{
        const parsed = parseRoomFile(e.target.result, file.name);
        if(parsed){
          const roomKey = parsed.date + '|' + parsed.room;
          elective.rooms[roomKey] = parsed; // optimistic local update
          renderElective(); renderSummary();
          await api('POST', '/api/elective/rooms', { roomKey, date: parsed.date, room: parsed.room, patients: parsed.patients });
          setStatus('Synced ' + new Date().toLocaleTimeString());
        }
      }catch(err){
        alert('Could not read "' + file.name + '": ' + err.message);
      }
      pending--;
      if(pending === 0){ renderElective(); renderSummary(); }
    };
    reader.readAsArrayBuffer(file);
  });
}

let electiveSortMode = 'room'; // 'room' (grouped per room, by time) or 'ward' (all rooms mixed, grouped by ward)

function renderElective(){
  const el = elective;
  const panel = document.getElementById('elective-panel');
  const roomKeys = Object.keys(el.rooms).sort();

  if(roomKeys.length === 0){
    panel.innerHTML = `<div class="empty-state">No patient list loaded yet.<br>Click <strong>Upload Room File(s)</strong> above and select today's room export(s).</div>`;
    return;
  }

  if(electiveSortMode === 'ward') renderElectiveByWard(panel, el, roomKeys);
  else renderElectiveByRoom(panel, el, roomKeys);

  attachElectiveHandlers(panel);
}

// Default view: one table per OR room, patients sorted by time — matches the room export files.
function renderElectiveByRoom(panel, el, roomKeys){
  let html = '';
  roomKeys.forEach(roomKey=>{
    const roomData = el.rooms[roomKey];
    const patients = [...roomData.patients].sort((a,b)=> (a.time||'').localeCompare(b.time||''));
    html += `<section class="card">
      <h2 style="display:flex;justify-content:space-between;align-items:center;">
        <span>${roomData.room}</span>
        <button type="button" class="room-del-btn" data-room-key="${escapeAttr(roomKey)}" title="Remove this room's list">Remove room</button>
      </h2>
      <div class="room-meta">${roomData.date} &middot; ${patients.length} case(s)</div>
      <div style="overflow-x:auto;">
      <table class="plist">
        <thead><tr>
          <th>Time</th><th>HN</th><th>Name</th><th>Age</th><th>Ward</th>
          <th>Diagnosis</th><th>Procedure</th><th>Surgeon</th><th>Anesthesia</th><th>NPO</th>
          ${ELECTIVE_CHECK_ITEMS.map(it=>`<th>${it.label}</th>`).join('')}
          <th></th>
        </tr></thead>
        <tbody>
        ${patients.map(p=> patientRowHtml(p, roomKey, el)).join('')}
        </tbody>
      </table>
      </div>
    </section>`;
  });
  panel.innerHTML = html;
}

// Ward view: every patient from every room mixed into one list, grouped by ward — for walking
// ward-to-ward and checking everyone there regardless of which OR room they're booked into.
function renderElectiveByWard(panel, el, roomKeys){
  let allPatients = [];
  roomKeys.forEach(roomKey=>{
    const roomData = el.rooms[roomKey];
    roomData.patients.forEach(p=> allPatients.push({...p, roomKey, roomName: roomData.room}));
  });
  allPatients.sort((a,b)=>{
    const w = (a.ward||'').localeCompare(b.ward||'', 'th');
    if(w !== 0) return w;
    return (a.time||'').localeCompare(b.time||'');
  });

  const colCount = 11 + ELECTIVE_CHECK_ITEMS.length + 1; // +Room column vs. the per-room view
  let lastWard = null;
  const rowsHtml = allPatients.map(p=>{
    let groupHeader = '';
    if(p.ward !== lastWard){
      lastWard = p.ward;
      groupHeader = `<tr class="ward-group-row"><td colspan="${colCount}">${p.ward || '(no ward listed)'}</td></tr>`;
    }
    return groupHeader + patientRowHtml(p, p.roomKey, el, true);
  }).join('');

  panel.innerHTML = `<section class="card">
    <h2>All Rooms — Grouped by Ward</h2>
    <div class="room-meta">${allPatients.length} case(s) across ${roomKeys.length} room(s)</div>
    <div style="overflow-x:auto;">
    <table class="plist">
      <thead><tr>
        <th>Time</th><th>HN</th><th>Name</th><th>Age</th><th>Ward</th><th>Room</th>
        <th>Diagnosis</th><th>Procedure</th><th>Surgeon</th><th>Anesthesia</th><th>NPO</th>
        ${ELECTIVE_CHECK_ITEMS.map(it=>`<th>${it.label}</th>`).join('')}
        <th></th>
      </tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>
    </div>
  </section>`;
}

function patientRowHtml(p, roomKey, el, showRoomCol){
  const key = patientKey(p);
  const checks = el.checks[key] || {};
  const allDone = ELECTIVE_CHECK_ITEMS.every(it=>checks[it.id]);
  return `<tr id="row-${cssEscape(key)}" class="${allDone?'row-complete':''}">
    <td>${p.time}</td><td>${p.hn}</td><td>${p.name}</td><td>${p.age}</td><td>${p.ward}</td>
    ${showRoomCol ? `<td>${p.roomName}</td>` : ''}
    <td>${p.diagnosis}</td><td>${p.procedure}</td><td>${p.surgeon}</td><td>${p.anesthesia}</td><td>${p.npo}</td>
    ${ELECTIVE_CHECK_ITEMS.map(it=>`<td class="chk"><input type="checkbox" data-key="${escapeAttr(key)}" data-item="${it.id}" ${checks[it.id]?'checked':''}></td>`).join('')}
    <td class="chk"><button type="button" class="row-del-btn" data-room-key="${escapeAttr(roomKey)}" data-patient-key="${escapeAttr(key)}" title="Remove this patient">✕</button></td>
  </tr>`;
}

function attachElectiveHandlers(panel){
  panel.querySelectorAll('input[type=checkbox]').forEach(cb=>{
    cb.addEventListener('change', async ()=>{
      const key = cb.dataset.key, item = cb.dataset.item;
      if(!elective.checks[key]) elective.checks[key] = {};
      elective.checks[key][item] = cb.checked; // optimistic
      const row = cb.closest('tr');
      const allChecked = Array.from(row.querySelectorAll('input[type=checkbox]')).every(x=>x.checked);
      row.classList.toggle('row-complete', allChecked);
      renderSummary();
      try{
        await api('PATCH', '/api/elective/checks/' + encodeURIComponent(key), { item, value: cb.checked });
        setStatus('Synced ' + new Date().toLocaleTimeString());
      }catch(err){
        setStatus('Sync error — retry with Refresh', true);
      }
    });
  });

  panel.querySelectorAll('.row-del-btn').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const roomKey = btn.dataset.roomKey, pKey = btn.dataset.patientKey;
      const roomData = elective.rooms[roomKey];
      if(!roomData) return;
      const p = roomData.patients.find(x=>x.key === pKey);
      const label = p ? `${p.name || p.hn}` : 'this patient';
      if(!confirm(`Remove ${label} from this list?`)) return;
      roomData.patients = roomData.patients.filter(x=>x.key !== pKey);
      renderElective(); renderSummary();
      try{
        await api('DELETE', `/api/elective/rooms/${encodeURIComponent(roomKey)}/patients/${encodeURIComponent(pKey)}`);
        setStatus('Synced ' + new Date().toLocaleTimeString());
      }catch(err){
        setStatus('Sync error — retry with Refresh', true);
      }
    });
  });

  panel.querySelectorAll('.room-del-btn').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const roomKey = btn.dataset.roomKey;
      const roomData = elective.rooms[roomKey];
      const label = roomData ? roomData.room : 'this room';
      if(!confirm(`Remove the entire "${label}" list? This cannot be undone.`)) return;
      delete elective.rooms[roomKey];
      renderElective(); renderSummary();
      try{
        await api('DELETE', `/api/elective/rooms/${encodeURIComponent(roomKey)}`);
        setStatus('Synced ' + new Date().toLocaleTimeString());
      }catch(err){
        setStatus('Sync error — retry with Refresh', true);
      }
    });
  });
}

function cssEscape(s){ return String(s).replace(/[^a-zA-Z0-9_-]/g, '_'); }
function escapeAttr(s){ return String(s).replace(/"/g,'&quot;'); }

function renderElectiveSummary(){
  const el = elective;
  const roomKeys = Object.keys(el.rooms);
  let allPatients = [];
  roomKeys.forEach(rk=>{
    const rd = el.rooms[rk];
    rd.patients.forEach(p=> allPatients.push({...p, date:rd.date, room:rd.room}));
  });

  const total = allPatients.length;
  let fullyChecked = 0;
  const missingList = [];

  allPatients.forEach(p=>{
    const key = patientKey(p);
    const checks = el.checks[key] || {};
    const missingItems = ELECTIVE_CHECK_ITEMS.filter(it=>!checks[it.id]);
    if(missingItems.length === 0) fullyChecked++;
    else missingList.push({key, name: p.name || p.hn, missing: missingItems.map(m=>m.label).join(', ')});
  });

  const pct = total ? Math.round((fullyChecked/total)*100) : 0;
  let html = `<strong>Elective Preop completeness: ${fullyChecked} / ${total} patients (${pct}%)</strong>
    <div class="summary-bar"><div class="summary-bar-fill" style="width:${pct}%"></div></div>`;

  if(total === 0){
    html += `<div class="summary-missing">No patients loaded yet.</div>`;
  } else if(missingList.length === 0){
    html += `<div class="summary-complete">✓ All patients fully checked.</div>`;
  } else {
    html += `<div class="summary-missing">${missingList.map(m=>`<a data-jump-row="row-${cssEscape(m.key)}">${m.name}</a> (${m.missing})`).join('<br>')}</div>`;
  }
  document.getElementById('summary').innerHTML = html;

  document.querySelectorAll('[data-jump-row]').forEach(a=>{
    a.addEventListener('click', ()=>{
      const rowEl = document.getElementById(a.dataset.jumpRow);
      if(rowEl){
        rowEl.scrollIntoView({behavior:'smooth', block:'center'});
        rowEl.classList.add('jump-highlight');
        setTimeout(()=>rowEl.classList.remove('jump-highlight'), 1500);
      }
    });
  });
}

/* =========================================================================
   ANESTHESIA PREOP — single shared working form (one active patient at a time)
   ========================================================================= */

const CHECK3_STATES = ['pending','done','na'];
const CHECK3_LABEL = {pending:'Pending', done:'Done', na:'N/A'};

const anesConfig = [
  { title: "Patient Identification", fields: [
    {id:'a_name', label:'Name', type:'text'},
    {id:'a_hn', label:'HN', type:'text'},
    {id:'a_age', label:'Age', type:'number'},
    {id:'a_sex', label:'Sex', type:'select', options:['Male','Female']},
    {id:'a_weight', label:'Body Weight (kg)', type:'number'},
    {id:'a_height', label:'Height (cm)', type:'number'},
    {id:'a_bmi', label:'BMI (auto)', type:'text', readonly:true},
    {id:'a_ward', label:'Ward / Bed', type:'text'},
  ]},
  { title: "Diagnosis & Surgery", fields: [
    {id:'a_diagnosis', label:'Diagnosis', type:'textarea', full:true},
    {id:'a_operation', label:'Planned Operation', type:'text', full:true},
    {id:'a_surgeon', label:'Surgeon', type:'text'},
    {id:'a_anes_plan', label:'Anesthetic Technique Planned', type:'text'},
    {id:'a_asa', label:'ASA Classification', type:'select', options:['I','II','III','IV','V','VI','I-E','II-E','III-E','IV-E','V-E']},
  ]},
  { title: "Allergy & NPO", fields: [
    {id:'a_allergy', label:'Drug / Food Allergies', type:'text'},
    {id:'a_npo_time', label:'NPO Since (time)', type:'text'},
  ]},
  { title: "Comorbidities & Medications", fields: [
    {id:'a_comorbid', label:'Underlying Disease(s)', type:'textarea', full:true},
    {id:'a_medications', label:'Current Medications', type:'textarea', full:true},
  ]},
  { title: "Airway Assessment", fields: [
    {id:'a_mallampati', label:'Mallampati Class', type:'select', options:['I','II','III','IV']},
    {id:'a_mouth_opening', label:'Mouth Opening', type:'text'},
    {id:'a_thyromental', label:'Thyromental Distance', type:'text'},
    {id:'a_dentition', label:'Dentition', type:'text'},
    {id:'a_airway_notes', label:'Other Airway Notes', type:'text', full:true},
  ]},
  { title: "Laboratory", fields: [
    {id:'a_cbc', label:'CBC (Hb/Hct/Plt)', type:'text'},
    {id:'a_bun', label:'BUN', type:'text'},
    {id:'a_cr', label:'Creatinine', type:'text'},
    {id:'a_na', label:'Na', type:'text'},
    {id:'a_k', label:'K', type:'text'},
    {id:'a_cl', label:'Cl', type:'text'},
    {id:'a_pt', label:'PT', type:'text'},
    {id:'a_ptt', label:'PTT', type:'text'},
    {id:'a_inr', label:'INR', type:'text'},
    {id:'a_bloodgroup', label:'Blood Group & Crossmatch (units)', type:'text'},
  ]},
  { title: "Imaging & Cardiac", fields: [
    {id:'a_cxr', label:'CXR Findings', type:'text'},
    {id:'a_ecg', label:'ECG Findings', type:'text'},
    {id:'a_echo', label:'Echo / EF (%) — if done', type:'text'},
  ]},
  { title: "Ventilator / Respiratory (if applicable)", fields: [
    {id:'a_vent_mode', label:'Ventilator Mode', type:'text'},
    {id:'a_tidal_volume', label:'Tidal Volume (mL)', type:'text'},
    {id:'a_rr', label:'Respiratory Rate', type:'text'},
    {id:'a_peep', label:'PEEP', type:'text'},
    {id:'a_fio2', label:'FiO2 (%)', type:'text'},
    {id:'a_spo2', label:'SpO2 (%)', type:'text'},
  ]},
  { title: "IV Access & Fluids", fields: [
    {id:'a_iv_access', label:'IV Access (site / gauge)', type:'text'},
    {id:'a_iv_fluid', label:'IV Fluid Running', type:'text'},
    {id:'a_blood_prep', label:'Blood Products Prepared', type:'text'},
  ]},
  { title: "Consent & Plan", check3: [
    {id:'a_consent_anes', label:'Informed consent for anesthesia signed'},
  ], fields: [
    {id:'a_other_notes', label:'Additional Notes', type:'textarea', full:true},
  ]},
];

let data = {}; // anes form field values, keyed by field id
let saveAnesTimer = null;

function saveAnesDebounced(){
  clearTimeout(saveAnesTimer);
  saveAnesTimer = setTimeout(async ()=>{
    try{
      await api('PUT', '/api/anes', data);
      setStatus('Synced ' + new Date().toLocaleTimeString());
    }catch(err){
      setStatus('Sync error — retry with Refresh', true);
    }
  }, 600);
}

async function refreshAnes(){
  // Skip if the user is actively typing in the anes form, so we don't clobber them mid-edit.
  if(document.getElementById('anes-panel').contains(document.activeElement)) return;
  try{
    data = await api('GET', '/api/anes') || {};
    renderPanel(anesConfig, 'anes');
    updateBMI();
    if(document.querySelector('.tab-btn.active').dataset.tab === 'anes') renderSummary();
  }catch(err){
    setStatus('Sync error — will retry', true);
  }
}

function fieldMissing(f){
  const v = data[f.id];
  if(f.readonly) return false;
  return v === undefined || v === null || String(v).trim() === '';
}

function renderField(f){
  const val = data[f.id] !== undefined ? data[f.id] : '';
  const missingClass = fieldMissing(f) ? 'missing' : 'filled';
  let inputHtml = '';
  if(f.type === 'select'){
    inputHtml = `<select id="${f.id}" class="${missingClass}" ${f.readonly?'disabled':''}>
      <option value="">-- select --</option>
      ${f.options.map(o=>`<option value="${o}" ${val===o?'selected':''}>${o}</option>`).join('')}
    </select>`;
  } else if(f.type === 'textarea'){
    inputHtml = `<textarea id="${f.id}" class="${missingClass}">${val}</textarea>`;
  } else {
    inputHtml = `<input type="${f.type}" id="${f.id}" class="${missingClass}" value="${val.replace ? val.replace(/"/g,'&quot;') : val}" ${f.readonly?'readonly':''}>`;
  }
  return `<div class="field ${f.full?'full':''}"><label for="${f.id}">${f.label}</label>${inputHtml}</div>`;
}

function renderCheck3(item){
  const state = data[item.id] || 'pending';
  const cls = 'pill-' + state;
  return `<div class="check3" data-id="${item.id}">
    <label>${item.label}</label>
    <button type="button" class="status-pill ${cls}" data-id="${item.id}">${CHECK3_LABEL[state]}</button>
  </div>`;
}

function renderPanel(config, containerId){
  const html = config.map((sec,i)=>{
    let inner = '';
    if(sec.fields) inner += `<div class="field-grid">${sec.fields.map(renderField).join('')}</div>`;
    if(sec.check3) inner += `<div style="padding:6px 16px 12px;">${sec.check3.map(renderCheck3).join('')}</div>`;
    return `<section class="card" id="sec-${containerId}-${i}"><h2>${sec.title}</h2>${inner}</section>`;
  }).join('');
  document.getElementById(containerId + '-panel').innerHTML = html;
  attachHandlers(config, containerId);
}

function attachHandlers(config, containerId){
  config.forEach(sec=>{
    (sec.fields||[]).forEach(f=>{
      const el = document.getElementById(f.id);
      if(!el || f.readonly) return;
      el.addEventListener('input', ()=>{
        data[f.id] = el.value;
        el.classList.toggle('missing', fieldMissing(f));
        el.classList.toggle('filled', !fieldMissing(f));
        if(f.id === 'a_weight' || f.id === 'a_height') updateBMI();
        saveAnesDebounced();
        renderSummary();
      });
    });
    (sec.check3||[]).forEach(item=>{
      const btn = document.querySelector(`.status-pill[data-id="${item.id}"]`);
      if(!btn) return;
      btn.addEventListener('click', ()=>{
        const cur = data[item.id] || 'pending';
        const next = CHECK3_STATES[(CHECK3_STATES.indexOf(cur)+1) % CHECK3_STATES.length];
        data[item.id] = next;
        btn.textContent = CHECK3_LABEL[next];
        btn.className = 'status-pill pill-' + next;
        saveAnesDebounced();
        renderSummary();
      });
    });
  });
}

function updateBMI(){
  const w = parseFloat(data['a_weight']);
  const h = parseFloat(data['a_height']);
  if(w && h){
    const bmi = (w / Math.pow(h/100,2)).toFixed(1);
    data['a_bmi'] = bmi;
    const el = document.getElementById('a_bmi');
    if(el) el.value = bmi;
  }
}

function allItems(config){
  const items = [];
  config.forEach((sec,i)=>{
    (sec.fields||[]).forEach(f=>items.push({...f, sectionIdx:i, kind:'field'}));
    (sec.check3||[]).forEach(c=>items.push({...c, sectionIdx:i, kind:'check3'}));
  });
  return items;
}

function isComplete(item){
  if(item.kind === 'field') return item.readonly ? true : !fieldMissing(item);
  return (data[item.id] || 'pending') !== 'pending';
}

function renderAnesSummary(){
  const containerId = 'anes';
  const items = allItems(anesConfig);
  const missing = items.filter(i=>!isComplete(i));
  const total = items.length;
  const done = total - missing.length;
  const pct = total ? Math.round((done/total)*100) : 0;

  let html = `<strong>Anesthesia Preop completeness: ${done} / ${total} (${pct}%)</strong>
    <div class="summary-bar"><div class="summary-bar-fill" style="width:${pct}%"></div></div>`;

  if(missing.length === 0){
    html += `<div class="summary-complete">✓ All items complete.</div>`;
  } else {
    html += `<div class="summary-missing">Missing: ${missing.map(m=>`<a data-jump="sec-${containerId}-${m.sectionIdx}">${m.label}</a>`).join(', ')}</div>`;
  }
  document.getElementById('summary').innerHTML = html;

  document.querySelectorAll('[data-jump]').forEach(a=>{
    a.addEventListener('click', ()=>{
      const el = document.getElementById(a.dataset.jump);
      if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
    });
  });
}

function renderSummary(){
  const activeTab = document.querySelector('.tab-btn.active').dataset.tab;
  if(activeTab === 'elective') renderElectiveSummary();
  else renderAnesSummary();
}

/* ---------- Tabs ---------- */

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.getElementById('elective-panel').style.display = tab === 'elective' ? 'block' : 'none';
    document.getElementById('anes-panel').style.display = tab === 'anes' ? 'block' : 'none';
    document.getElementById('toolbar-elective').style.display = tab === 'elective' ? 'flex' : 'none';
    document.getElementById('toolbar-anes').style.display = tab === 'anes' ? 'flex' : 'none';
    renderSummary();
  });
});

document.getElementById('resetBtn').addEventListener('click', async ()=>{
  if(confirm('Clear the Anesthesia Preop form for a new patient? This cannot be undone, and clears it for everyone.')){
    data = {};
    renderPanel(anesConfig, 'anes');
    updateBMI();
    renderSummary();
    try{ await api('PUT', '/api/anes', {}); setStatus('Synced ' + new Date().toLocaleTimeString()); }
    catch(err){ setStatus('Sync error — retry with Refresh', true); }
  }
});

document.getElementById('clearListBtn').addEventListener('click', async ()=>{
  if(confirm('Clear the entire Elective Preop patient list and checklist? This cannot be undone, and clears it for everyone.')){
    elective = { rooms: {}, checks: {} };
    renderElective();
    renderSummary();
    try{ await api('DELETE', '/api/elective'); setStatus('Synced ' + new Date().toLocaleTimeString()); }
    catch(err){ setStatus('Sync error — retry with Refresh', true); }
  }
});

document.getElementById('fileInput').addEventListener('change', (e)=>{
  handleFiles(e.target.files);
  e.target.value = '';
});

document.getElementById('sortMode').addEventListener('change', (e)=>{
  electiveSortMode = e.target.value;
  renderElective();
});

document.getElementById('refreshBtn').addEventListener('click', ()=>{
  refreshElective();
  refreshAnes();
});

/* ---------- Init & polling ---------- */

async function init(){
  setStatus('Loading…');
  await Promise.all([refreshElective(), refreshAnes()]);
  renderSummary();

  // Keep everyone's view in sync without needing a manual refresh.
  setInterval(()=>{
    if(pendingSaves > 0) return; // avoid clobbering an in-flight optimistic update
    refreshElective();
    refreshAnes();
  }, 15000);
}

init();
</script>
